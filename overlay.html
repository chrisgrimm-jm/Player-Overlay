<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Player Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1920px; height: 1080px; overflow: hidden; background: transparent; }
    #photo-wrap {
      position: absolute;
      left: 30px;
      top: 50%;
      transform: translateY(-50%) translateX(calc(-100% - 30px));
      transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      width: 460px;
    }
    #photo-wrap.visible { transform: translateY(-50%) translateX(0); }
    #photo-frame { border: 7px solid #fff; width: 100%; aspect-ratio: 3/4; overflow: hidden; background: #1a1a1a; }
    #photo-frame img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; }
  </style>
</head>
<body>
  <div id="photo-wrap">
    <div id="photo-frame">
      <img id="player-img" src="" alt="">
    </div>
  </div>

  <script>
    const wrap = document.getElementById('photo-wrap');
    const img  = document.getElementById('player-img');
    const topic = new URLSearchParams(location.search).get('topic') || '';

    function showUrl(url) {
      img.onload = () => wrap.classList.add('visible');
      img.src = url;
    }

    function hide() {
      wrap.classList.remove('visible');
      setTimeout(() => { img.src = ''; }, 600);
    }

    if (!topic) { console.warn('No topic set — add ?topic=your-topic to the URL'); }
    else {
      const es = new EventSource('https://ntfy.sh/' + topic + '/sse');
      es.addEventListener('message', e => {
        try {
          const data = JSON.parse(JSON.parse(e.data).message);
          if (data.action === 'show' && data.url) showUrl(data.url);
          else if (data.action === 'hide') hide();
        } catch {}
      });
    }
  </script>
</body>
</html>
